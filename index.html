    // Adicionei apenas pequenas melhorias de UX no final:
    function refreshData() {
      document.getElementById('loadingOverlay').classList.remove('hidden');
      location.reload();
    }

    // Animações de entrada suaves
    function initScrollAnimations() {
      const cards = document.querySelectorAll('.glass, .stat-card, .chart-section');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, { threshold: 0.2 });
      
      cards.forEach(card => {
        card.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
        card.style.opacity = '0';
        card.style.transform = 'translateY(30px)';
        observer.observe(card);
      });
    }

    // Inicializa tudo
    window.onload = function() {
      // Seu fetchAllData() original continua funcionando
      fetchAllData();
      
      // Animações premium
      setTimeout(() => {
        initScrollAnimations();
      }, 800);
      
      console.log('%c✅ OnChainBR Premium carregado com sucesso!', 'color:#22ff88; font-size:13px; font-weight:700');
    };
  </script>
